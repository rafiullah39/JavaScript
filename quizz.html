<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    margin: 0;
    padding: 30px;
    display: flex;
    justify-content: center;
  }

  .container {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
  }

  h1 {
    text-align: center;
    color: #333;
    font-size: 22px;
    margin-top: 0;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #666;
    margin-bottom: 8px;
  }

  .timer-bar-bg {
    background-color: #ddd;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .timer-bar-fill {
    height: 100%;
    background-color: #4CAF50;
    width: 100%;
  }

  .question-text {
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 15px;
    color: #222;
  }

  .option-btn {
    display: block;
    width: 100%;
    text-align: left;
    background-color: #f9f9f9;
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }

  .option-btn:hover {
    background-color: #eee;
  }

  .option-btn.correct {
    background-color: #c8e6c9;
    border-color: #4CAF50;
  }

  .option-btn.incorrect {
    background-color: #ffcdd2;
    border-color: #e57373;
  }

  .next-btn {
    width: 100%;
    padding: 10px;
    background-color: #2196F3;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
  }

  .result-screen {
    text-align: center;
  }

  .result-score {
    font-size: 40px;
    font-weight: bold;
    color: #4CAF50;
    margin: 10px 0;
  }

  .restart-btn {
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="container">
  <h1>JavaScript Quiz</h1>

  <div class="status-row">
    <span id="questionCounter">Question 1 / 5</span>
    <span id="timerDisplay">15s</span>
  </div>
  <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerFill"></div></div>

  <div id="quizCard"></div>
</div>

<script>
  const questions = [
    {
      q: "What does 'let' give you that 'var' does not?",
      options: ["Block scope", "Faster execution", "Automatic typing", "Global access"],
      answer: 0
    },
    {
      q: "What is a closure?",
      options: [
        "A loop that never ends",
        "A function that remembers variables from where it was created",
        "A way to close a browser tab",
        "A type of array method"
      ],
      answer: 1
    },
    {
      q: "What does console.log(typeof null) print?",
      options: ["'null'", "'undefined'", "'object'", "'boolean'"],
      answer: 2
    },
    {
      q: "Which method adds an element to the END of an array?",
      options: ["shift()", "unshift()", "pop()", "push()"],
      answer: 3
    },
    {
      q: "What happens if you use a 'let' variable before its declaration?",
      options: [
        "It returns undefined",
        "It throws a ReferenceError",
        "It auto becomes 0",
        "Nothing happens"
      ],
      answer: 1
    }
  ];

  function createQuizEngine(questionSet, onUpdate) {
    let currentIndex = 0;
    let score = 0;
    let timeLeft = 15;
    let timerId = null;

    function startTimer() {
      clearInterval(timerId);
      timeLeft = 15;
      timerId = setInterval(function () {
        timeLeft--;
        onUpdate("tick", { timeLeft: timeLeft });
        if (timeLeft <= 0) {
          clearInterval(timerId);
          onUpdate("timeout", {});
        }
      }, 1000);
    }

    return {
      current: function () { return questionSet[currentIndex]; },
      index: function () { return currentIndex; },
      total: function () { return questionSet.length; },
      score: function () { return score; },

      begin: function () {
        currentIndex = 0;
        score = 0;
        startTimer();
      },

      answer: function (selectedIndex) {
        clearInterval(timerId);
        const correct = questionSet[currentIndex].answer;
        const isCorrect = selectedIndex === correct;
        if (isCorrect) score++;
        return { isCorrect: isCorrect, correct: correct };
      },

      next: function () {
        currentIndex++;
        if (currentIndex < questionSet.length) {
          startTimer();
          return true;
        }
        return false;
      }
    };
  }

  const quizCard = document.getElementById("quizCard");
  const questionCounter = document.getElementById("questionCounter");
  const timerDisplay = document.getElementById("timerDisplay");
  const timerFill = document.getElementById("timerFill");

  function handleEngineEvent(type, data) {
    if (type === "tick") {
      timerDisplay.textContent = data.timeLeft + "s";
      const percent = (data.timeLeft / 15) * 100;
      timerFill.style.width = percent + "%";
      timerFill.style.backgroundColor = percent < 30 ? "#e57373" : "#4CAF50";
    }
    if (type === "timeout") {
      lockOptions(-1);
    }
  }

  const engine = createQuizEngine(questions, handleEngineEvent);

  function renderQuestion() {
    const q = engine.current();
    questionCounter.textContent = "Question " + (engine.index() + 1) + " / " + engine.total();

    quizCard.innerHTML = `
      <div class="question-text">${q.q}</div>
      <div id="optionsWrap"></div>
      <button class="next-btn" id="nextBtn">Next Question</button>
    `;

    const optionsWrap = document.getElementById("optionsWrap");
    q.options.forEach(function (opt, i) {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      btn.setAttribute("data-index", i);
      btn.addEventListener("click", function () {
        selectAnswer(i);
      });
      optionsWrap.appendChild(btn);
    });
  }

  function selectAnswer(selectedIndex) {
    const result = engine.answer(selectedIndex);
    lockOptions(selectedIndex, result.correct);
  }

  function lockOptions(selectedIndex, correctIndex) {
    const buttons = document.querySelectorAll(".option-btn");
    const correct = correctIndex !== undefined ? correctIndex : engine.current().answer;

    buttons.forEach(function (btn, i) {
      btn.disabled = true;
      if (i === correct) btn.classList.add("correct");
      else if (i === selectedIndex) btn.classList.add("incorrect");
    });

    const nextBtn = document.getElementById("nextBtn");
    nextBtn.style.display = "block";
    nextBtn.addEventListener("click", function () {
      const hasNext = engine.next();
      if (hasNext) {
        renderQuestion();
      } else {
        renderResults();
      }
    }, { once: true });
  }

  function renderResults() {
    quizCard.innerHTML = `
      <div class="result-screen">
        <p>Quiz complete!</p>
        <div class="result-score">${engine.score()} / ${engine.total()}</div>
        <button class="restart-btn" id="restartBtn">Try Again</button>
      </div>
    `;
    questionCounter.textContent = "Finished";
    timerFill.style.width = "0%";
    timerDisplay.textContent = "--";

    document.getElementById("restartBtn").addEventListener("click", function () {
      engine.begin();
      renderQuestion();
    });
  }

  engine.begin();
  renderQuestion();
</script>
</body>
</html>
